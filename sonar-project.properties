# EWOS SonarQube / SonarCloud configuration.
#
# The Maven build writes JaCoCo output to target/site/jacoco/jacoco.xml,
# which Sonar consumes as the source of truth for coverage. The rest of
# our quality gates (Spotless, Checkstyle, PMD, SpotBugs) already run in
# `mvn verify`; Sonar is complementary, not a replacement.
#
# Local one-off scan (needs SONAR_TOKEN + SONAR_HOST_URL exported):
#   mvn -B verify
#   mvn -B sonar:sonar

sonar.projectKey=buntychavan-web_ewos
sonar.projectName=EWOS
sonar.projectVersion=0.0.1-SNAPSHOT

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.source=21
sonar.sourceEncoding=UTF-8

# Compiled classes for Sonar's Java analyser (populated by `mvn compile`).
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# JaCoCo coverage report — must match the JaCoCo plugin config in pom.xml.
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Same exclusions we apply in JaCoCo — generated code, configuration wiring, and
# straight-through DTO/entity records don't add meaningful coverage signal.
sonar.coverage.exclusions=\
  src/main/java/com/ewos/EwosApplication.java,\
  src/main/java/com/ewos/shared/config/**,\
  src/main/java/com/ewos/**/dto/**,\
  src/main/java/com/ewos/**/domain/**,\
  src/main/java/com/ewos/**/infrastructure/persistence/**
