spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ewos}
    username: ${SPRING_DATASOURCE_USERNAME:ewos}
    password: ${SPRING_DATASOURCE_PASSWORD:ewos}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: ewos-dev-pool
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.ewos: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
