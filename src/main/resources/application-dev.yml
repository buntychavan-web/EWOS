spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ewos}
    username: ${SPRING_DATASOURCE_USERNAME:ewos}
    password: ${SPRING_DATASOURCE_PASSWORD:ewos}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: ewos-dev-pool
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    # Local dev origins — Vite (5173), Create-React-App (3000), and their 127.0.0.1 aliases.
    # Override via APP_CORS_ALLOWED_ORIGINS if the frontend runs elsewhere.
    allowed-origins: >-
      ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}

logging:
  level:
    root: INFO
    com.ewos: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
