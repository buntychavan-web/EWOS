spring:
  application:
    name: ewos
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

app:
  purge:
    # Framework ships disabled. Turn on per-job when operations is ready to
    # own the retention decisions.
    enabled: ${APP_PURGE_ENABLED:false}
    cron: ${APP_PURGE_CRON:0 15 3 * * *}
    zone: ${APP_PURGE_ZONE:UTC}
    expired-refresh-token-retention: ${APP_PURGE_REFRESH_RETENTION:30d}
    soft-deleted-row-retention: ${APP_PURGE_SOFT_DELETE_RETENTION:365d}
    expired-refresh-tokens-enabled: ${APP_PURGE_REFRESH_ENABLED:false}
    soft-deleted-rows-enabled: ${APP_PURGE_SOFT_DELETE_ENABLED:false}
  redis:
    enabled: true
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-please-use-a-256-bit-secret-in-production-environments}
      issuer: ${JWT_ISSUER:ewos}
      access-token-ttl: ${JWT_ACCESS_TTL:15m}
      refresh-token-ttl: ${JWT_REFRESH_TTL:7d}
    bootstrap:
      admin:
        username: ${ADMIN_USERNAME:admin}
        email: ${ADMIN_EMAIL:admin@ewos.local}
        password: ${ADMIN_PASSWORD:ChangeMe!Admin123}
    password-policy:
      min-length: ${PASSWORD_MIN_LENGTH:8}
      max-length: ${PASSWORD_MAX_LENGTH:128}
      require-uppercase: ${PASSWORD_REQUIRE_UPPERCASE:true}
      require-lowercase: ${PASSWORD_REQUIRE_LOWERCASE:true}
      require-digit: ${PASSWORD_REQUIRE_DIGIT:true}
      require-special: ${PASSWORD_REQUIRE_SPECIAL:true}
      history-size: ${PASSWORD_HISTORY_SIZE:5}
    lockout:
      enabled: ${AUTH_LOCKOUT_ENABLED:true}
      max-attempts: ${AUTH_LOCKOUT_MAX_ATTEMPTS:5}
      lock-duration: ${AUTH_LOCKOUT_DURATION:15m}
    rate-limit:
      enabled: ${AUTH_RATELIMIT_ENABLED:true}
      max-attempts: ${AUTH_RATELIMIT_MAX_ATTEMPTS:60}
      window: ${AUTH_RATELIMIT_WINDOW:1m}
  cors:
    # Empty by default. Each profile (dev/test/prod) supplies its own list; prod
    # requires the operator to set APP_CORS_ALLOWED_ORIGINS explicitly.
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD
    allowed-headers: Authorization,Content-Type,Accept,Origin,X-Request-ID,X-Requested-With
    exposed-headers: X-Request-ID,Location
    allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:true}
    max-age: ${APP_CORS_MAX_AGE:1h}
    path-patterns: /**

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
