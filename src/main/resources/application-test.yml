spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true

app:
  redis:
    enabled: false
  security:
    jwt:
      secret: test-secret-key-for-integration-tests-only-do-not-use-in-production-envs
      issuer: ewos-test
      access-token-ttl: 5m
      refresh-token-ttl: 1h
    lockout:
      # Tests spam login by design; leave the counter on but with generous headroom
      # so no test accidentally trips it.
      enabled: true
      max-attempts: 1000
      lock-duration: 1m
    rate-limit:
      # Disable IP throttling in tests — MockMvc reuses "127.0.0.1" and would trip.
      enabled: false
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

logging:
  level:
    root: WARN
    com.ewos: INFO
