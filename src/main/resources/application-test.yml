spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true

app:
  redis:
    enabled: false
  security:
    jwt:
      secret: test-secret-key-for-integration-tests-only-do-not-use-in-production-envs
      issuer: ewos-test
      access-token-ttl: 5m
      refresh-token-ttl: 1h

logging:
  level:
    root: WARN
    com.ewos: INFO
