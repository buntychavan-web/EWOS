services:
  postgres:
    image: postgres:16-alpine
    container_name: ewos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ewos}
      POSTGRES_USER: ${POSTGRES_USER:-ewos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ewos}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ewos} -d ${POSTGRES_DB:-ewos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ewos-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: ewos-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ewos}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ewos}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ewos}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_SECURITY_JWT_SECRET: ${JWT_SECRET:-change-me-please-use-a-256-bit-secret-in-production-envs}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres-data:
  redis-data:
